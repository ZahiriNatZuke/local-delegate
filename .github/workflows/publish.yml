name: Publish

# 推送 vX.Y.Z tag 时自动发布到 PyPI。
# 需要在 GitHub Secrets 中设置 PYPI_TOKEN（zagan 账号的 API token，scope: Entire account）。

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  pypi:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.11"

      - name: Check lockfile up-to-date
        run: uv lock --check

      - name: Build
        run: uv build

      - name: Publish to PyPI
        run: uv publish
        env:
          UV_PUBLISH_TOKEN: ${{ secrets.PYPI_TOKEN }}
